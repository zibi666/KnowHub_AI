services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "900", "1", "--save", "300", "10", "--save", "60", "10000", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  searxng:
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./data/searxng/config:/etc/searxng
      - ./data/searxng/cache:/var/cache/searxng
    ports:
      - "8888:8080"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_SESSION_URL: redis://redis:6379/1
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/app.db}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: ./backend
    restart: unless-stopped
    command: ["arq", "app.workers.jobs.WorkerSettings"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      REDIS_SESSION_URL: redis://redis:6379/1
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/app.db}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis-data:
